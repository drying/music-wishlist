<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Music Wishlist</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0f0f0f; color: #e8e8e8; min-height: 100vh; }
    header { background: #1a1a1a; padding: 16px 24px; border-bottom: 1px solid #2a2a2a; display: flex; align-items: center; gap: 16px; }
    header h1 { font-size: 20px; font-weight: 700; color: #fff; }
    header span { font-size: 13px; color: #888; }
    .container { max-width: 900px; margin: 0 auto; padding: 24px 16px; }

    /* Add form */
    .add-form { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 12px; padding: 20px; margin-bottom: 24px; }
    .add-form h2 { font-size: 15px; font-weight: 600; margin-bottom: 16px; color: #ccc; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .form-grid .full { grid-column: 1 / -1; }
    input, select, textarea {
      width: 100%; background: #111; border: 1px solid #333; color: #e8e8e8;
      border-radius: 8px; padding: 10px 12px; font-size: 14px; outline: none;
      transition: border-color 0.2s;
    }
    input:focus, select:focus, textarea:focus { border-color: #1DB954; }
    textarea { resize: vertical; min-height: 60px; }
    select option { background: #111; }
    .btn { padding: 10px 20px; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: opacity 0.2s; }
    .btn:hover { opacity: 0.85; }
    .btn-green { background: #1DB954; color: #000; }
    .btn-sm { padding: 6px 14px; font-size: 12px; }
    .btn-danger { background: #c0392b; color: #fff; }
    .btn-gray { background: #333; color: #ccc; }

    /* Filters */
    .filters { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }
    .filter-btn { padding: 6px 16px; border-radius: 20px; border: 1px solid #333; background: transparent; color: #aaa; font-size: 13px; cursor: pointer; transition: all 0.2s; }
    .filter-btn.active { background: #1DB954; border-color: #1DB954; color: #000; font-weight: 600; }
    .search-box { flex: 1; min-width: 180px; }
    .search-box input { padding: 7px 12px; font-size: 13px; }

    /* List */
    .item-list { display: flex; flex-direction: column; gap: 10px; }
    .item { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 10px; padding: 14px 16px; display: flex; align-items: flex-start; gap: 12px; }
    .item:hover { border-color: #3a3a3a; }
    .item-info { flex: 1; min-width: 0; }
    .item-title { font-size: 15px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .item-sub { font-size: 13px; color: #888; margin-top: 3px; }
    .item-memo { font-size: 12px; color: #666; margin-top: 6px; font-style: italic; }
    .item-badges { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
    .badge { font-size: 11px; padding: 3px 8px; border-radius: 4px; font-weight: 600; }
    .badge-cd { background: #1a3a2a; color: #1DB954; }
    .badge-digital { background: #1a2a3a; color: #3a9ad9; }
    .badge-vinyl { background: #3a1a2a; color: #c97fd4; }
    .badge-want { background: #2a2a1a; color: #d4b93a; }
    .badge-bought { background: #1a3a2a; color: #1DB954; }
    .badge-skip { background: #2a1a1a; color: #888; }
    .item-actions { display: flex; gap: 6px; align-items: flex-start; }
    .empty { text-align: center; color: #555; padding: 60px 0; font-size: 15px; }

    /* Status edit inline */
    .status-select { background: transparent; border: none; color: inherit; font-size: 11px; font-weight: 600; cursor: pointer; padding: 0; }
  </style>
</head>
<body>
  <header>
    <h1>🎵 Music Wishlist</h1>
    <span id="count-label"></span>
  </header>
  <div class="container">

    <!-- Add Form -->
    <div class="add-form">
      <h2>＋ 追加</h2>
      <div class="form-grid">
        <input id="f-title" placeholder="曲名 / アルバム名 *" />
        <input id="f-artist" placeholder="アーティスト *" />
        <input id="f-album" placeholder="アルバム名（任意）" />
        <select id="f-format">
          <option value="CD">CD</option>
          <option value="Digital">デジタル</option>
          <option value="Vinyl">レコード</option>
          <option value="Other">その他</option>
        </select>
        <textarea id="f-memo" class="full" placeholder="メモ（任意）"></textarea>
      </div>
      <div style="margin-top:12px; display:flex; gap:8px;">
        <button class="btn btn-green" onclick="addItem()">追加する</button>
        <button class="btn btn-gray" onclick="clearForm()">クリア</button>
      </div>
    </div>

    <!-- Filters -->
    <div class="filters">
      <button class="filter-btn active" data-status="" onclick="setFilter(this, '')">すべて</button>
      <button class="filter-btn" data-status="want" onclick="setFilter(this, 'want')">欲しい</button>
      <button class="filter-btn" data-status="bought" onclick="setFilter(this, 'bought')">購入済</button>
      <button class="filter-btn" data-status="skip" onclick="setFilter(this, 'skip')">スキップ</button>
      <div class="search-box">
        <input id="search" placeholder="検索..." oninput="onSearch()" />
      </div>
    </div>

    <!-- List -->
    <div id="item-list" class="item-list"></div>
    <div id="empty" class="empty" style="display:none">アイテムがありません</div>
  </div>

  <script>
    let currentFilter = '';
    let searchTimer = null;

    const formatBadge = f => {
      const map = { CD: 'badge-cd', Digital: 'badge-digital', Vinyl: 'badge-vinyl' };
      return `<span class="badge ${map[f] || 'badge-cd'}">${f}</span>`;
    };
    const statusBadge = s => {
      const map = { want: ['badge-want', '欲しい'], bought: ['badge-bought', '購入済'], skip: ['badge-skip', 'スキップ'] };
      const [cls, label] = map[s] || ['badge-want', s];
      return `<span class="badge ${cls}">${label}</span>`;
    };

    async function loadItems() {
      const q = document.getElementById('search').value;
      const params = new URLSearchParams();
      if (currentFilter) params.set('status', currentFilter);
      if (q) params.set('q', q);
      const res = await fetch('/api/items?' + params);
      const items = await res.json();
      const list = document.getElementById('item-list');
      const empty = document.getElementById('empty');
      document.getElementById('count-label').textContent = `${items.length} 件`;
      if (!items.length) { list.innerHTML = ''; empty.style.display = 'block'; return; }
      empty.style.display = 'none';
      list.innerHTML = items.map(item => `
        <div class="item" id="item-${item.id}">
          <div class="item-info">
            <div class="item-title">${esc(item.title)}</div>
            <div class="item-sub">${esc(item.artist)}${item.album ? ' — ' + esc(item.album) : ''}</div>
            ${item.memo ? `<div class="item-memo">${esc(item.memo)}</div>` : ''}
            <div class="item-badges">
              ${formatBadge(item.format)}
              ${statusBadge(item.status)}
            </div>
          </div>
          <div class="item-actions">
            <select class="btn btn-sm btn-gray status-select" onchange="updateStatus(${item.id}, this.value)">
              <option value="want" ${item.status==='want'?'selected':''}>欲しい</option>
              <option value="bought" ${item.status==='bought'?'selected':''}>購入済</option>
              <option value="skip" ${item.status==='skip'?'selected':''}>スキップ</option>
            </select>
            <button class="btn btn-sm btn-danger" onclick="deleteItem(${item.id})">削除</button>
          </div>
        </div>
      `).join('');
    }

    function esc(s) {
      if (!s) return '';
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    async function addItem() {
      const title = document.getElementById('f-title').value.trim();
      const artist = document.getElementById('f-artist').value.trim();
      if (!title || !artist) { alert('曲名とアーティストは必須です'); return; }
      await fetch('/api/items', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          title, artist,
          album: document.getElementById('f-album').value.trim() || null,
          format: document.getElementById('f-format').value,
          memo: document.getElementById('f-memo').value.trim() || null,
        })
      });
      clearForm();
      loadItems();
    }

    function clearForm() {
      ['f-title','f-artist','f-album','f-memo'].forEach(id => document.getElementById(id).value = '');
      document.getElementById('f-format').value = 'CD';
    }

    async function updateStatus(id, status) {
      await fetch(`/api/items/${id}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ status })
      });
      loadItems();
    }

    async function deleteItem(id) {
      if (!confirm('削除しますか？')) return;
      await fetch(`/api/items/${id}`, { method: 'DELETE' });
      loadItems();
    }

    function setFilter(btn, status) {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentFilter = status;
      loadItems();
    }

    function onSearch() {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(loadItems, 300);
    }

    loadItems();
  </script>
</body>
</html>
